services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: rahul
      POSTGRES_PASSWORD: rahul123
      POSTGRES_DB: graph_engine
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - neo4j_data:/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://rahul:rahul123@postgres:5432/graph_engine
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - neo4j

volumes:
  postgres_data:
  neo4j_data: